<h2>등장인물</h2>
<p>조수 임무 제1장 제6막 클리어 시, 캐릭터 창 왼쪽위 속성이 적혀있는곳에 회전 표시가 생겨나며 이것을 누르면 전투상황이 아닐 때 자유롭게 속성을 변경 가능하다. 모든 속성은 공명자 돌파 수치를 공유하며, 장비, 에코를 공유한다.[6] 스킬 업그레이드 수치, 돌파 수치는 공유하지 않는다.</p>
